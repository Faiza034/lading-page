<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      max-width: 700px;
      margin: auto;
    }

    
.slideshow-container {
  max-width: 1000px;
  position: relative;
  margin: auto;
}

    input,
    button {
      padding: 8px;
      margin: 6px 0;
      width: 100%;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }

    th,
    td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }

    th {
      background-color: #f2f2f2;
    }
  </style>
</head>

<body>

  <div class="slideshow-container">
  <div class="mySlides fade">
    <img src="img1.jpg" style="width:100%">
  </div>
  <form id="recordForm">
    <input type="hidden" id="recordId">

    <label>student Name</label> <br>
    <input type="text" id="name" placeholder="Student Name" required> <br>

    <label>Math marks</label> <br>
    <input type="integer" id="math" placeholder="Math Marks" required> <br>

    <label>science marks</label> <br>
    <input type="integer" id="science" placeholder="Science Marks" required> <br>

    <label>computer</label> <br>
    <input type="integer" id="computer" placeholder="Computer Marks" required> <br>

    <label>english</label> <br>
    <input type="integer" id="english" placeholder="English Marks" required> <br>

    <label>Email:</label>
    <input type="email" id="email" placeholder="Email" required">

    <button type="button" onclick="handleSubmit(event)">Save</button>
    <button type="button" onclick="clearForm()">Clear</button>
  </form>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>computer</th>
        <th>english</th>
        <th>science</th>
        <th>math</th>
        <th>Total</th>
        <th>Avg</th>
        <th>Email</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

<script>
  let students = [];
  let nextId = 1;

  function handleSubmit(event) {
    const id = document.getElementById("recordId").value;
    let name = document.getElementById('name').value;
    let math = Number(document.getElementById('math').value);
    let science = Number(document.getElementById('science').value);
    let computer = Number(document.getElementById('computer').value);
    let english = Number(document.getElementById('english').value);
    let email = document.getElementById("email").value;
    const total = math + science + computer + english;
    const average = (total / 4).toFixed(2);

    if (id) {
      const index = students.findIndex(s => s.id == id);
      const updatedStudent = { id: Number(id), name, email, computer, science, math, english, total, average };
      students.splice(index, 1, updatedStudent); // replace at index
      alert("Record updated!");
    } else {
      students.push({ id: nextId++, name, computer, science, math, english, email, total, average });
      console.log(students);
      alert("Record added!");
    }

    clearForm();
    renderTable();
    
  }
  function editStudent(id) {
    const student = students.find(s => s.id === id);
    if (!student) return;

    document.getElementById("recordId").value = student.id;
    document.getElementById("name").value = student.name;
    document.getElementById("email").value = student.email;
    document.getElementById("math").value = "";  // original marks not stored
    document.getElementById("science").value = "";
    document.getElementById("computer").value = "";
    document.getElementById("english").value = "";

    alert("You can now re-enter marks and save.");
  }
  function deleteStudent(id) {
    if (confirm("Are you sure to delete?")) {
      const index = students.findIndex(s => s.id === id);
      students.splice(index, 1); // 🗑️ DELETE using splice
      renderTable();
    }
  }

  function clearForm() {
    document.getElementById("recordId").value = "";
    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("math").value = "";
    document.getElementById("science").value = "";
    document.getElementById("computer").value = "";
    document.getElementById("english").value = "";
  }

  function renderTable() {
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    // 📋 READ using slice (copy)
    const studentList = students.slice(); // copy of full array

    if (studentList.length === 0) {
      tbody.innerHTML = '<tr><td colspan="10">No records found.</td></tr>';
      return;
    }

    studentList.forEach(student => {
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${student.id}</td>
        <td>${student.name}</td>
         <td>${student.computer}</td>
        <td>${student.science}</td>
        <td>${student.math}</td>
        <td>${student.english}</td>
        <td>${student.total}</td>
        <td>${student.average}</td>
        <td>${student.email}</td>
        <td>
          <button onclick="editStudent(${student.id})">Edit</button>
          <button onclick="deleteStudent(${student.id})">Delete</button>
        </td>
      `;
      tbody.appendChild(row);
    });
  }

  renderTable();

let slideIndex = 1;
showSlides(slideIndex);

function currentSlide(n) {
  showSlides(slideIndex = n);
}
</script>
</body>
</html>
